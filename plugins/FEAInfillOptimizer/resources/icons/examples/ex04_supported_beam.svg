<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="120" viewBox="0 0 200 120">

  <!-- Simply supported beam: horizontal bar, supports at both ends, top load -->

  <!-- Beam body -->
  <rect x="30" y="45" width="140" height="20" fill="#555555" stroke="#AAAAAA" stroke-width="1.5"/>

  <!-- Left support highlight (green) -->
  <rect x="30" y="45" width="12" height="20" fill="#22AA44" opacity="0.35" stroke="#22AA44" stroke-width="1.5"/>

  <!-- Right support highlight (green) -->
  <rect x="158" y="45" width="12" height="20" fill="#22AA44" opacity="0.35" stroke="#22AA44" stroke-width="1.5"/>

  <!-- Support triangles below -->
  <polygon points="36,65 24,80 48,80" fill="none" stroke="#22AA44" stroke-width="1.5"/>
  <polygon points="164,65 152,80 176,80" fill="none" stroke="#22AA44" stroke-width="1.5"/>

  <!-- Ground line -->
  <line x1="15" y1="80" x2="185" y2="80" stroke="#888888" stroke-width="1.5"/>

  <!-- Force arrows (red) pointing down on top face -->
  <line x1="65" y1="28" x2="65" y2="43" stroke="#DD4444" stroke-width="2"/>
  <polygon points="65,45 61,39 69,39" fill="#DD4444"/>
  <line x1="100" y1="28" x2="100" y2="43" stroke="#DD4444" stroke-width="2"/>
  <polygon points="100,45 96,39 104,39" fill="#DD4444"/>
  <line x1="135" y1="28" x2="135" y2="43" stroke="#DD4444" stroke-width="2"/>
  <polygon points="135,45 131,39 139,39" fill="#DD4444"/>

  <!-- Stress indicator at center bottom -->
  <line x1="85" y1="65" x2="115" y2="65" stroke="#FFAA00" stroke-width="2" stroke-dasharray="3,2"/>

  <!-- Labels -->
  <text x="36" y="42" font-family="sans-serif" font-size="9" fill="#22AA44" text-anchor="middle">Fixed</text>
  <text x="164" y="42" font-family="sans-serif" font-size="9" fill="#22AA44" text-anchor="middle">Fixed</text>
  <text x="100" y="24" font-family="sans-serif" font-size="10" fill="#DD4444" text-anchor="middle">F = 100 N</text>
  <text x="100" y="95" font-family="sans-serif" font-size="9" fill="#FFAA00" text-anchor="middle">max stress</text>
  <text x="100" y="110" font-family="sans-serif" font-size="11" fill="#CCCCCC" text-anchor="middle">Supported Beam</text>

</svg>
