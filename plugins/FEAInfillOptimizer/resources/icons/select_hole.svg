<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Hole (circle in a surface, inner wall highlighted) -->
  <rect x="3" y="3" width="18" height="18" rx="2"/>
  <!-- Outer circle of hole -->
  <ellipse cx="12" cy="12" rx="5" ry="5"/>
  <!-- Inner shading to suggest depth/concavity -->
  <ellipse cx="12" cy="12" rx="3.5" ry="3.5" fill="currentColor" opacity="0.3"/>
  <!-- Depth line -->
  <ellipse cx="12" cy="14" rx="5" ry="2" stroke-dasharray="2,2" opacity="0.5"/>
</svg>
